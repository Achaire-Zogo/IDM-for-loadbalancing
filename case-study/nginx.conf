worker_processes auto;

events {
    worker_connections 1024;
}

http {
    # Logging pour visualiser la repartition
    log_format lb_log '$remote_addr - [$time_local] "$request" '
                      'upstream: $upstream_addr '
                      'status: $upstream_status '
                      'response_time: $upstream_response_time';

    access_log /var/log/nginx/access.log lb_log;

    # Cluster WebFrontend - Round Robin (par defaut dans Nginx)
    upstream WebFrontend {
        server web1:8080 weight=3;
        server web2:8080 weight=2;
        server web3:8080 weight=1;
    }

    # Cluster APIBackend - Least Connections
    upstream APIBackend {
        least_conn;
        server api1:3000 weight=1;
        server api2:3000 weight=1;
    }

    # Serveur pour le frontend web (port 80)
    server {
        listen 80;
        server_name localhost;

        location / {
            proxy_pass http://WebFrontend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # Health check passif
            proxy_next_upstream error timeout http_500 http_502 http_503;
            proxy_next_upstream_timeout 5s;
            proxy_next_upstream_tries 3;
        }

        location /health {
            proxy_pass http://WebFrontend/health;
        }

        # Page de statut Nginx
        location /nginx_status {
            stub_status on;
            allow 127.0.0.1;
            allow 172.0.0.0/8;
            deny all;
        }
    }

    # Serveur pour l'API backend (port 3000)
    server {
        listen 3000;
        server_name localhost;

        location / {
            proxy_pass http://APIBackend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            proxy_next_upstream error timeout http_500 http_502 http_503;
            proxy_next_upstream_timeout 5s;
            proxy_next_upstream_tries 2;
        }

        location /api/health {
            proxy_pass http://APIBackend/api/health;
        }
    }
}
