services:
  # ============================================================
  # CLUSTER WebFrontend - 3 serveurs web (Round Robin, weights: 3,2,1)
  # ============================================================
  web1:
    build:
      context: ./servers/web
    container_name: web1
    environment:
      - SERVER_NAME=web1
      - SERVER_PORT=8080
      - SERVER_WEIGHT=3
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M
    networks:
      - lb_network

  web2:
    build:
      context: ./servers/web
    container_name: web2
    environment:
      - SERVER_NAME=web2
      - SERVER_PORT=8080
      - SERVER_WEIGHT=2
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M
    networks:
      - lb_network

  web3:
    build:
      context: ./servers/web
    container_name: web3
    environment:
      - SERVER_NAME=web3
      - SERVER_PORT=8080
      - SERVER_WEIGHT=1
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M
    networks:
      - lb_network

  # ============================================================
  # CLUSTER APIBackend - 2 serveurs API (Least Connections)
  # ============================================================
  api1:
    build:
      context: ./servers/api
    container_name: api1
    environment:
      - SERVER_NAME=api1
      - SERVER_PORT=3000
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/api/health"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M
    networks:
      - lb_network

  api2:
    build:
      context: ./servers/api
    container_name: api2
    environment:
      - SERVER_NAME=api2
      - SERVER_PORT=3000
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/api/health"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M
    networks:
      - lb_network

  # ============================================================
  # LOAD BALANCER - Nginx
  # ============================================================
  loadbalancer:
    image: nginx:alpine
    container_name: loadbalancer
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    ports:
      - "80:80"
      - "3000:3000"
    depends_on:
      web1:
        condition: service_healthy
      web2:
        condition: service_healthy
      web3:
        condition: service_healthy
      api1:
        condition: service_healthy
      api2:
        condition: service_healthy
    networks:
      - lb_network
    restart: unless-stopped

networks:
  lb_network:
    driver: bridge
