version: '3.8'
services:
      web1:
        build: ./servers/web
        environment:
          - SERVER_NAME=web1
          - SERVER_PORT=8080
        healthcheck:
          test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
          interval: 30s
          timeout: 10s
        networks:
          - lb-network
      web2:
        build: ./servers/web
        environment:
          - SERVER_NAME=web2
          - SERVER_PORT=8080
        healthcheck:
          test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
          interval: 30s
          timeout: 10s
        networks:
          - lb-network
      web3:
        build: ./servers/web
        environment:
          - SERVER_NAME=web3
          - SERVER_PORT=8080
        healthcheck:
          test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
          interval: 30s
          timeout: 10s
        networks:
          - lb-network
      api1:
        build: ./servers/api
        environment:
          - SERVER_NAME=api1
          - SERVER_PORT=3000
        healthcheck:
          test: ["CMD", "curl", "-f", "http://localhost:3000/api/health"]
          interval: 15s
          timeout: 5s
        networks:
          - lb-network
      api2:
        build: ./servers/api
        environment:
          - SERVER_NAME=api2
          - SERVER_PORT=3000
        healthcheck:
          test: ["CMD", "curl", "-f", "http://localhost:3000/api/health"]
          interval: 15s
          timeout: 5s
        networks:
          - lb-network

  loadbalancer:
    image: nginx:alpine
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    ports:
        - "80:80"
        - "3000:3000"
    depends_on:
          web1:
            condition: service_healthy
          web2:
            condition: service_healthy
          web3:
            condition: service_healthy
          api1:
            condition: service_healthy
          api2:
            condition: service_healthy
    networks:
      - lb-network

networks:
  lb-network:
    driver: bridge
