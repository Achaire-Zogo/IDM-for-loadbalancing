worker_processes auto;

events {
    worker_connections 1024;
}

http {
    upstream WebFrontend {
        server 192.168.1.10:8080 weight=3
            max_fails=3
            fail_timeout=30s;
        server 192.168.1.11:8080 weight=2
            max_fails=3
            fail_timeout=30s;
        server 192.168.1.12:8080 weight=1
            max_fails=3
            fail_timeout=30s;
    }
    upstream APIBackend {
        least_conn;
        server 192.168.2.10:3000 weight=1
            max_fails=3
            fail_timeout=30s;
        server 192.168.2.11:3000 weight=1
            max_fails=3
            fail_timeout=30s;
    }

    server {
        listen 80;
        server_name _;
    }
    server {
        listen 3000;
        server_name _;
    }
}
